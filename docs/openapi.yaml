openapi: 3.0.0
info:
  title: MuseLab API
  version: 1.0.0

paths:
  /songs:
    get:
      summary: 전체 곡 목록 조회 (필터 지원)
      parameters:
        - in: query
          name: levelMin
          required: false
          schema:
            type: number
          description: 최소 레벨 (예: 11.1)
        - in: query
          name: levelMax
          required: false
          schema:
            type: number
          description: 최대 레벨 (예: 11.5)
        - in: query
          name: course
          required: false
          schema:
            type: string
            enum: [master, hidden]
          description: 난이도 필터 (master 또는 hidden)
      responses:
        '200':
          description: 성공
        '404':
          description: 조건에 맞는 곡 없음

  /songs/{title}:
    get:
      summary: 제목으로 곡 검색 (필터 지원)
      parameters:
        - in: path
          name: title
          required: true
          schema:
            type: string
          description: 검색할 곡 제목
        - in: query
          name: levelMin
          required: false
          schema:
            type: number
          description: 최소 레벨 (예: 11.1)
        - in: query
          name: levelMax
          required: false
          schema:
            type: number
          description: 최대 레벨 (예: 11.5)
        - in: query
          name: course
          required: false
          schema:
            type: string
            enum: [master, hidden]
          description: 난이도 필터 (master 또는 hidden)
      responses:
        '200':
          description: 성공
        '404':
          description: 곡을 찾을 수 없음

  /current-song:
    get:
      summary: 현재 재생 중인 곡 조회
      responses:
        '200':
          description: 성공
    post:
      summary: 현재 재생 중인 곡 설정
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
              responses:
                '200':
                  description: 성공   

      